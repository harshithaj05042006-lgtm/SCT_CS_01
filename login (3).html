<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>CipherShield Text Pro — Secure Login</title>
<meta name="description" content="Advanced Caesar Cipher Encryption & Decryption Platform — Secure Login"/>
<link rel="stylesheet" href="/style.css"/>
</head>
<body class="dark">
  <!-- Loading Screen -->
  <div id="loader" class="loader">
    <div class="shield-loader">
      <svg viewBox="0 0 100 120" width="120" height="140">
        <defs>
          <linearGradient id="shieldGrad" x1="0" y1="0" x2="1" y2="1">
            <stop offset="0%" stop-color="#00e5ff"/>
            <stop offset="100%" stop-color="#7c3aed"/>
          </linearGradient>
        </defs>
        <path d="M50 5 L95 22 V60 C95 90 75 110 50 118 C25 110 5 90 5 60 V22 Z"
              fill="none" stroke="url(#shieldGrad)" stroke-width="3" class="shield-path"/>
        <path d="M30 60 L45 75 L72 45" fill="none" stroke="#00e5ff" stroke-width="4"
              stroke-linecap="round" stroke-linejoin="round" class="shield-check"/>
      </svg>
      <h2>CipherShield Text Pro</h2>
      <p>Initializing secure environment…</p>
      <div class="loader-bar"><span></span></div>
    </div>
  </div>

  <!-- Background -->
  <canvas id="particles"></canvas>
  <div class="grid-overlay"></div>
  <div class="glow-orb glow-orb-1"></div>
  <div class="glow-orb glow-orb-2"></div>

  <main class="auth-wrap">
    <section class="glass auth-card">
      <div class="brand">
        <div class="logo-mark">
          <svg viewBox="0 0 64 64" width="44" height="44">
            <defs>
              <linearGradient id="lg" x1="0" y1="0" x2="1" y2="1">
                <stop offset="0%" stop-color="#00e5ff"/>
                <stop offset="100%" stop-color="#a855f7"/>
              </linearGradient>
            </defs>
            <path d="M32 4 L58 14 V34 C58 50 46 58 32 62 C18 58 6 50 6 34 V14 Z"
                  fill="url(#lg)" opacity=".15" stroke="url(#lg)" stroke-width="2"/>
            <text x="32" y="40" text-anchor="middle" font-family="JetBrains Mono, monospace"
                  font-size="22" font-weight="700" fill="url(#lg)">C</text>
          </svg>
        </div>
        <div>
          <h1>CipherShield <span class="accent">Text Pro</span></h1>
          <p class="subtitle">Advanced Caesar Cipher Encryption Platform</p>
        </div>
      </div>

      <form id="loginForm" novalidate>
        <div class="field">
          <label for="username">Username</label>
          <div class="input-wrap">
            <svg class="icon" viewBox="0 0 24 24" width="18" height="18"><path fill="currentColor" d="M12 12a5 5 0 1 0-5-5 5 5 0 0 0 5 5Zm0 2c-4 0-9 2-9 6v2h18v-2c0-4-5-6-9-6Z"/></svg>
            <input id="username" type="text" autocomplete="username" placeholder="agent@ciphershield" required/>
          </div>
        </div>

        <div class="field">
          <label for="password">Password</label>
          <div class="input-wrap">
            <svg class="icon" viewBox="0 0 24 24" width="18" height="18"><path fill="currentColor" d="M17 8V6a5 5 0 0 0-10 0v2H5v14h14V8ZM9 6a3 3 0 0 1 6 0v2H9Z"/></svg>
            <input id="password" type="password" autocomplete="current-password" placeholder="••••••••" required/>
            <button type="button" id="togglePwd" class="ghost-btn" aria-label="Toggle password visibility">Show</button>
          </div>
        </div>

        <div class="row between">
          <label class="check"><input type="checkbox" id="remember"/><span>Remember me</span></label>
          <a href="#" class="link">Forgot password?</a>
        </div>

        <div id="loginError" class="error-msg hidden"></div>

        <button type="submit" class="btn primary ripple" id="loginBtn">
          <span class="btn-label">Secure Sign-In</span>
          <span class="spinner hidden"></span>
        </button>

        <p class="hint">Demo: any non-empty username & password ≥ 4 chars</p>
      </form>

      <footer class="auth-foot">
        <span>v1.0 • SkillCraft Cyber Security</span>
        <span class="status-dot"></span> <span>Encrypted Session</span>
      </footer>
    </section>
  </main>

  <div id="toast-host" class="toast-host"></div>
  <script src="/script.js" defer></script>
  <script>
    window.addEventListener('DOMContentLoaded', () => {
      CipherShield.initBackground();
      CipherShield.initLoader();
      CipherShield.initLogin();
    });
  </script>
</body>
</html>
